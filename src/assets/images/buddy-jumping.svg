<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140">
  <defs>
    <linearGradient id="jumpFur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5DBA5"/>
      <stop offset="50%" stop-color="#E8C17A"/>
      <stop offset="100%" stop-color="#D4A85F"/>
    </linearGradient>
    <linearGradient id="jumpDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A85F"/>
      <stop offset="100%" stop-color="#B8914A"/>
    </linearGradient>
  </defs>
  
  <!-- Celebration particles -->
  <circle cx="20" cy="30" r="4" fill="#7ED321">
    <animate attributeName="opacity" values="1;0" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="30;15" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="25" r="3" fill="#FFD700">
    <animate attributeName="opacity" values="1;0" dur="0.8s" repeatCount="indefinite" begin="0.2s"/>
    <animate attributeName="cy" values="25;10" dur="0.8s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle cx="15" cy="50" r="3" fill="#FF8FA0">
    <animate attributeName="opacity" values="1;0" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
    <animate attributeName="cy" values="50;35" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <circle cx="105" cy="45" r="4" fill="#7ED321">
    <animate attributeName="opacity" values="1;0" dur="0.9s" repeatCount="indefinite" begin="0.3s"/>
    <animate attributeName="cy" values="45;30" dur="0.9s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  
  <!-- Stars -->
  <text x="10" y="20" font-size="14">⭐</text>
  <text x="95" y="15" font-size="12">✨</text>
  <text x="5" y="60" font-size="10">✨</text>
  
  <!-- Ears (excited, up) -->
  <ellipse cx="30" cy="50" rx="12" ry="22" fill="url(#jumpDark)" transform="rotate(-30, 30, 50)"/>
  <ellipse cx="30" cy="52" rx="8" ry="15" fill="url(#jumpFur)" transform="rotate(-30, 30, 52)"/>
  <ellipse cx="90" cy="50" rx="12" ry="22" fill="url(#jumpDark)" transform="rotate(30, 90, 50)"/>
  <ellipse cx="90" cy="52" rx="8" ry="15" fill="url(#jumpFur)" transform="rotate(30, 90, 52)"/>
  
  <!-- Tail (super wagging) -->
  <ellipse cx="95" cy="85" rx="18" ry="7" fill="url(#jumpDark)" transform="rotate(-45, 95, 85)">
    <animateTransform attributeName="transform" type="rotate" values="-45 95 85;-20 95 85;-45 95 85" dur="0.2s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Body -->
  <ellipse cx="60" cy="95" rx="35" ry="25" fill="url(#jumpFur)"/>
  
  <!-- Legs (jumping pose) -->
  <ellipse cx="35" cy="118" rx="10" ry="14" fill="url(#jumpDark)" transform="rotate(-15, 35, 118)"/>
  <ellipse cx="50" cy="120" rx="10" ry="14" fill="url(#jumpDark)" transform="rotate(5, 50, 120)"/>
  <ellipse cx="70" cy="120" rx="10" ry="14" fill="url(#jumpDark)" transform="rotate(-5, 70, 120)"/>
  <ellipse cx="85" cy="118" rx="10" ry="14" fill="url(#jumpDark)" transform="rotate(15, 85, 118)"/>
  
  <!-- Head -->
  <ellipse cx="60" cy="62" rx="30" ry="32" fill="url(#jumpFur)"/>
  
  <!-- Face patch -->
  <ellipse cx="60" cy="70" rx="20" ry="18" fill="#FFF5E0"/>
  
  <!-- Snout -->
  <ellipse cx="60" cy="78" rx="12" ry="9" fill="#FFF8EA"/>
  
  <!-- Nose -->
  <ellipse cx="60" cy="73" rx="7" ry="5" fill="#333"/>
  
  <!-- Eyes (super happy, squinting) -->
  <path d="M42 58 Q50 52 58 58" stroke="#3D2B1F" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M62 58 Q70 52 78 58" stroke="#3D2B1F" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Big happy mouth -->
  <path d="M45 85 Q60 100 75 85" stroke="#8B6B4D" stroke-width="2" fill="#FFF5E0"/>
  <ellipse cx="60" cy="90" rx="12" ry="12" fill="#FF8FA0"/>
  <path d="M60 88 L60 95" stroke="#E86B80" stroke-width="1.5"/>
  
  <!-- Collar -->
  <path d="M35 92 Q60 100 85 92" stroke="#7ED321" stroke-width="5" fill="none"/>
  <circle cx="60" cy="96" r="5" fill="#FFD700"/>
  
  <!-- Hearts -->
  <text x="25" y="45" font-size="16">💚</text>
  <text x="80" y="40" font-size="14">💛</text>
</svg>
