<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="avatarBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E0"/>
      <stop offset="100%" stop-color="#C8E6C0"/>
    </linearGradient>
    <linearGradient id="avatarSkin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE0C4"/>
      <stop offset="100%" stop-color="#F5D0A8"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#avatarBg)"/>
  
  <!-- Body/shoulders -->
  <ellipse cx="50" cy="95" rx="35" ry="25" fill="#7ED321"/>
  
  <!-- Neck -->
  <rect x="40" y="60" width="20" height="20" fill="url(#avatarSkin)"/>
  
  <!-- Head -->
  <ellipse cx="50" cy="42" rx="28" ry="30" fill="url(#avatarSkin)"/>
  
  <!-- Hair -->
  <ellipse cx="50" cy="28" rx="30" ry="22" fill="#5D4037"/>
  <ellipse cx="30" cy="35" rx="8" ry="15" fill="#5D4037"/>
  <ellipse cx="70" cy="35" rx="8" ry="15" fill="#5D4037"/>
  
  <!-- Eyes -->
  <ellipse cx="40" cy="42" rx="5" ry="6" fill="white"/>
  <ellipse cx="60" cy="42" rx="5" ry="6" fill="white"/>
  <circle cx="40" cy="43" r="3" fill="#3D2B1F"/>
  <circle cx="60" cy="43" r="3" fill="#3D2B1F"/>
  <circle cx="39" cy="41" r="1" fill="white"/>
  <circle cx="59" cy="41" r="1" fill="white"/>
  
  <!-- Eyebrows -->
  <path d="M34 36 Q40 34 46 36" stroke="#5D4037" stroke-width="2" fill="none"/>
  <path d="M54 36 Q60 34 66 36" stroke="#5D4037" stroke-width="2" fill="none"/>
  
  <!-- Nose -->
  <ellipse cx="50" cy="50" rx="3" ry="4" fill="#E8C4A8"/>
  
  <!-- Smile -->
  <path d="M42 58 Q50 64 58 58" stroke="#8B6B4D" stroke-width="2" fill="none"/>
  
  <!-- Blush -->
  <ellipse cx="32" cy="52" rx="5" ry="3" fill="#FFB8B8" opacity="0.5"/>
  <ellipse cx="68" cy="52" rx="5" ry="3" fill="#FFB8B8" opacity="0.5"/>
  
  <!-- Paw badge on shirt -->
  <circle cx="50" cy="82" r="8" fill="white"/>
  <ellipse cx="50" cy="84" rx="4" ry="3" fill="#7ED321"/>
  <circle cx="46" cy="80" r="2" fill="#7ED321"/>
  <circle cx="50" cy="78" r="2" fill="#7ED321"/>
  <circle cx="54" cy="80" r="2" fill="#7ED321"/>
</svg>
