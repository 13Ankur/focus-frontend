<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="corgiFur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C87A"/>
      <stop offset="50%" stop-color="#E8B05A"/>
      <stop offset="100%" stop-color="#D4994A"/>
    </linearGradient>
    <linearGradient id="corgiDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4994A"/>
      <stop offset="100%" stop-color="#B88035"/>
    </linearGradient>
  </defs>
  
  <!-- Big ears -->
  <ellipse cx="18" cy="28" rx="16" ry="28" fill="url(#corgiFur)" transform="rotate(-15, 18, 28)"/>
  <ellipse cx="18" cy="32" rx="10" ry="18" fill="#FFE8D0" transform="rotate(-15, 18, 32)"/>
  <ellipse cx="82" cy="28" rx="16" ry="28" fill="url(#corgiFur)" transform="rotate(15, 82, 28)"/>
  <ellipse cx="82" cy="32" rx="10" ry="18" fill="#FFE8D0" transform="rotate(15, 82, 32)"/>
  
  <!-- Body (short and long) -->
  <ellipse cx="50" cy="85" rx="35" ry="14" fill="url(#corgiFur)"/>
  
  <!-- Head -->
  <ellipse cx="50" cy="52" rx="30" ry="28" fill="url(#corgiFur)"/>
  
  <!-- Face -->
  <ellipse cx="50" cy="58" rx="22" ry="20" fill="white"/>
  
  <!-- Forehead mark -->
  <path d="M50 35 L42 50 L50 55 L58 50 Z" fill="url(#corgiFur)"/>
  
  <!-- Nose -->
  <ellipse cx="50" cy="60" rx="8" ry="5" fill="#333"/>
  
  <!-- Eyes (big and happy) -->
  <circle cx="38" cy="48" r="9" fill="white"/>
  <circle cx="62" cy="48" r="9" fill="white"/>
  <circle cx="39" cy="49" r="6" fill="#3D2B1F"/>
  <circle cx="63" cy="49" r="6" fill="#3D2B1F"/>
  <circle cx="37" cy="46" r="3" fill="white"/>
  <circle cx="61" cy="46" r="3" fill="white"/>
  
  <!-- Happy mouth -->
  <path d="M40 70 Q50 80 60 70" stroke="#8B6B4D" stroke-width="2" fill="none"/>
  <ellipse cx="50" cy="74" rx="8" ry="9" fill="#FF8FA0"/>
</svg>
