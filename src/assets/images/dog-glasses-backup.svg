<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <!-- Fur gradients for realistic look -->
    <linearGradient id="mainFur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8C686"/>
      <stop offset="30%" stop-color="#D4A85C"/>
      <stop offset="70%" stop-color="#C99A4A"/>
      <stop offset="100%" stop-color="#B8863A"/>
    </linearGradient>
    
    <linearGradient id="darkFur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C99A4A"/>
      <stop offset="100%" stop-color="#8B6B35"/>
    </linearGradient>
    
    <linearGradient id="lightFur" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6C8"/>
      <stop offset="100%" stop-color="#E8D4AA"/>
    </linearGradient>
    
    <linearGradient id="creamFur" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8EA"/>
      <stop offset="100%" stop-color="#F5E6C8"/>
    </linearGradient>
    
    <linearGradient id="noseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A4A4A"/>
      <stop offset="50%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    
    <linearGradient id="tongueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF9CAD"/>
      <stop offset="100%" stop-color="#E87A8C"/>
    </linearGradient>
    
    <radialGradient id="eyeWhite" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </radialGradient>
    
    <radialGradient id="eyeBrown" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#5A4030"/>
      <stop offset="80%" stop-color="#3D2820"/>
      <stop offset="100%" stop-color="#2A1A10"/>
    </radialGradient>
    
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A4A4A"/>
      <stop offset="100%" stop-color="#2A3A3A"/>
    </linearGradient>
    
    <!-- Soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    
    <!-- Glass reflection -->
    <linearGradient id="glassReflect" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="400" height="500" rx="32" fill="url(#bgGrad)"/>
  
  <!-- Body/Chest fur -->
  <ellipse cx="200" cy="480" rx="160" ry="100" fill="url(#mainFur)" filter="url(#softShadow)"/>
  <ellipse cx="200" cy="460" rx="120" ry="70" fill="url(#lightFur)"/>
  
  <!-- Left Ear -->
  <ellipse cx="80" cy="160" rx="55" ry="95" fill="url(#darkFur)" transform="rotate(-20, 80, 160)"/>
  <ellipse cx="85" cy="165" rx="40" ry="70" fill="url(#mainFur)" transform="rotate(-20, 85, 165)"/>
  <ellipse cx="88" cy="170" rx="25" ry="45" fill="url(#lightFur)" transform="rotate(-20, 88, 170)" opacity="0.6"/>
  
  <!-- Right Ear -->
  <ellipse cx="320" cy="160" rx="55" ry="95" fill="url(#darkFur)" transform="rotate(20, 320, 160)"/>
  <ellipse cx="315" cy="165" rx="40" ry="70" fill="url(#mainFur)" transform="rotate(20, 315, 165)"/>
  <ellipse cx="312" cy="170" rx="25" ry="45" fill="url(#lightFur)" transform="rotate(20, 312, 170)" opacity="0.6"/>
  
  <!-- Head -->
  <ellipse cx="200" cy="230" rx="145" ry="155" fill="url(#mainFur)" filter="url(#softShadow)"/>
  
  <!-- Forehead highlight -->
  <ellipse cx="200" cy="180" rx="80" ry="60" fill="url(#lightFur)" opacity="0.5"/>
  
  <!-- Face/muzzle area -->
  <ellipse cx="200" cy="280" rx="100" ry="85" fill="url(#creamFur)"/>
  
  <!-- Cheeks -->
  <ellipse cx="130" cy="250" rx="50" ry="55" fill="url(#lightFur)" opacity="0.7"/>
  <ellipse cx="270" cy="250" rx="50" ry="55" fill="url(#lightFur)" opacity="0.7"/>
  
  <!-- Snout -->
  <ellipse cx="200" cy="300" rx="55" ry="45" fill="#FFF5E5"/>
  <ellipse cx="200" cy="295" rx="45" ry="35" fill="#FFFAF0"/>
  
  <!-- Nose -->
  <ellipse cx="200" cy="275" rx="32" ry="24" fill="url(#noseGrad)"/>
  <ellipse cx="192" cy="268" rx="10" ry="6" fill="#555" opacity="0.6"/>
  <ellipse cx="200" cy="282" rx="18" ry="8" fill="#111"/>
  
  <!-- Nose highlight -->
  <ellipse cx="188" cy="266" rx="6" ry="4" fill="#666"/>
  
  <!-- Mouth line -->
  <path d="M168 305 Q200 320 232 305" stroke="#7A5A3A" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Tongue -->
  <ellipse cx="200" cy="355" rx="30" ry="45" fill="url(#tongueGrad)"/>
  <path d="M200 320 L200 380" stroke="#D55A6A" stroke-width="2.5"/>
  <ellipse cx="200" cy="350" rx="22" ry="15" fill="#FFB0BC" opacity="0.4"/>
  
  <!-- Left Eye -->
  <ellipse cx="145" cy="200" rx="32" ry="36" fill="url(#eyeWhite)"/>
  <circle cx="145" cy="203" r="20" fill="url(#eyeBrown)"/>
  <circle cx="140" cy="195" r="7" fill="#FFF"/>
  <circle cx="150" cy="208" r="3" fill="#FFF" opacity="0.6"/>
  
  <!-- Right Eye -->
  <ellipse cx="255" cy="200" rx="32" ry="36" fill="url(#eyeWhite)"/>
  <circle cx="255" cy="203" r="20" fill="url(#eyeBrown)"/>
  <circle cx="250" cy="195" r="7" fill="#FFF"/>
  <circle cx="260" cy="208" r="3" fill="#FFF" opacity="0.6"/>
  
  <!-- Eyebrows (fur texture) -->
  <path d="M100 165 Q145 150 175 170" stroke="url(#darkFur)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M300 165 Q255 150 225 170" stroke="url(#darkFur)" stroke-width="12" fill="none" stroke-linecap="round"/>
  
  <!-- Glasses Frame -->
  <g stroke="#2A2A2A" stroke-width="5" fill="none">
    <!-- Left lens frame -->
    <circle cx="145" cy="200" r="52"/>
    <!-- Right lens frame -->
    <circle cx="255" cy="200" r="52"/>
    <!-- Bridge -->
    <path d="M197 200 Q200 195 203 200"/>
    <!-- Left temple -->
    <path d="M93 195 L55 175 Q45 172 40 180"/>
    <!-- Right temple -->
    <path d="M307 195 L345 175 Q355 172 360 180"/>
  </g>
  
  <!-- Glass lens reflection -->
  <ellipse cx="130" cy="185" rx="25" ry="15" fill="url(#glassReflect)" transform="rotate(-15, 130, 185)"/>
  <ellipse cx="240" cy="185" rx="25" ry="15" fill="url(#glassReflect)" transform="rotate(15, 240, 185)"/>
  
  <!-- Tomato Timer -->
  <g transform="translate(55, 385)">
    <!-- Shadow -->
    <ellipse cx="50" cy="65" rx="40" ry="10" fill="#000" opacity="0.15"/>
    
    <!-- Tomato body -->
    <ellipse cx="50" cy="45" rx="45" ry="42" fill="#FF6B6B"/>
    <ellipse cx="50" cy="42" rx="40" ry="38" fill="#FF7B7B"/>
    
    <!-- Highlight -->
    <ellipse cx="35" cy="30" rx="20" ry="12" fill="#FFA0A0" opacity="0.6" transform="rotate(-20, 35, 30)"/>
    
    <!-- Stem -->
    <rect x="44" y="0" width="12" height="18" rx="4" fill="#4CAF50"/>
    <ellipse cx="50" cy="3" rx="18" ry="10" fill="#66BB6A"/>
    
    <!-- Leaf -->
    <path d="M50 8 Q65 -5 75 10 Q65 8 50 8" fill="#4CAF50"/>
    <path d="M50 8 Q35 -5 25 10 Q35 8 50 8" fill="#4CAF50"/>
    
    <!-- Timer marks -->
    <circle cx="50" cy="18" r="4" fill="#E55555"/>
    <circle cx="75" cy="45" r="4" fill="#E55555"/>
    <circle cx="50" cy="72" r="4" fill="#E55555"/>
    <circle cx="25" cy="45" r="4" fill="#E55555"/>
    
    <!-- Center -->
    <circle cx="50" cy="45" r="3" fill="#CC4444"/>
  </g>
  
  <!-- Whisker dots -->
  <circle cx="140" cy="290" r="4" fill="#B8914A"/>
  <circle cx="130" cy="300" r="4" fill="#B8914A"/>
  <circle cx="145" cy="310" r="4" fill="#B8914A"/>
  <circle cx="260" cy="290" r="4" fill="#B8914A"/>
  <circle cx="270" cy="300" r="4" fill="#B8914A"/>
  <circle cx="255" cy="310" r="4" fill="#B8914A"/>
</svg>
